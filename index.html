<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

<link rel="icon" type="image/png" sizes="200x200" href="logo osis - Copy.jpg">


  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    *{
      font-family:'Poppins',sans-serif;
      scroll-behavior:smooth;
    }

body{
  background: #ffffff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px;
  margin: 0;
  overflow-x: hidden;
  position: relative;
}

/* Gradasi kiri */
body::before{
  content: "";
  position: fixed;
  left: -200px;
  top: 50%;
  transform: translateY(-50%);
  width: 450px;
  height: 450px;
  background: radial-gradient(
    circle,
    rgba(255,222,89,0.35) 0%,
    rgba(255,222,89,0.15)40%,
    transparent 75%
  );
  z-index: -1;
}

/* Gradasi kanan */
body::after{
  content: "";
  position: fixed;
  right: -200px;
  top: 50%;
  transform: translateY(-50%);
  width: 450px;
  height: 450px;
  background: radial-gradient(
    circle,
    rgba(255,222,89,0.35) 0%,
    rgba(255,222,89,0.15)40%,
    transparent 75%
  );
  z-index: -1;
}

/* Animasi card */
.card{
  background: white;
  border-radius: 30px;
  padding: 40px;
  max-width: 1000px;
  width: 100%;
  border: 1px solid rgba(255,119,34,.12);
  box-shadow: 0 20px 50px  rgba(255,222,89,0.15);
  animation: fadeUp 1s ease;
  transition: all .4s ease;
}

/* Efek saat mouse diarahkan */
.card:hover{
  transform: translateY(-12px) scale(1.02);
  box-shadow:
    0 35px 70px  rgba(255,119,34,.25),
    0 0 40px  rgba(255,222,89,0.15);
}

/* Muncul pertama kali */
@keyframes fadeUp{
  from{
    opacity: 0;
    transform: translateY(40px);
  }
  to{
    opacity: 1;
    transform: translateY(0);
  }
}

/* Melayang terus */
@keyframes floating{
  0%{
    transform: translateY(0px);
  }
  50%{
    transform: translateY(-10px);
  }
  100%{
    transform: translateY(0px);
  }
}
    .card{
      background:white;

      max-width:1000px;

    .hover-effect{

    }

    .hover-effect:hover{

    }

    .home-btn{
      transition:.3s;
    }

    .home-btn:hover{
      transform:translateY(-3px);
    }
  </style>
</head>
<body>

</div>

</body>
</html>
